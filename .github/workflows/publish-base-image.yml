name: Publish Base Image

on:
  push:
    paths:
      - .github/workflows/publish-base-image.yml
      - docker/images/govscape-base/Dockerfile
  pull_request:
    paths:
      - .github/workflows/publish-base-image.yml
      - docker/images/govscape-base/Dockerfile
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-base-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fast-fail: false
      matrix:
        include:
          - python_version: 3.11.14-trixie
            lucene_version: 10.0.0
            # Obtain checksum from https://dlcdn.apache.org/lucene/pylucene/
            lucene_sha256: "100c3d61d6799ac16b7b8c1826cddf07fb1715141ebdb0d7b8119cdd96b24574  pylucene-10.0.0-src.tar.gz"
            poetry_version: 2.1.2
          
          # Add more versions below as needed.

    steps:
      - name: Checkout
        uses: actions/checkout@5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }} # Only on push and manual trigger, not on PRs
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ github.repository_owner }}/govscape-base:${{ matrix.python_version }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=py${{ env.PYTHON_VERSION }}-lucene${{ env.LUCENE_VERSION }}-poetry${{ env.POETRY_VERSION }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/images/govscape-base
          file: docker/images/govscape-base/Dockerfile
          push: ${{ github.event_name != 'pull_request' }} # Only push on non-PR events
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            LUCENE_VERSION=${{ matrix.lucene_version }}
            LUCENE_SHA256=${{ matrix.lucene_sha256 }}
            POETRY_VERSION=${{ matrix.poetry_version }}
