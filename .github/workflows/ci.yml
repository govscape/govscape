defaults:
      run:
        shell: bash -el {0}

name: CI
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python: ['3.11.14']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/bcglee/govscape-base:py${{ matrix.python }}-lucene10.0.0-poetry2.3.2
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Install packages
        run: |
          /opt/poetry/bin/poetry install
      - name: Run tests
        run: |
          /opt/poetry/bin/poetry run pytest govscape/tests
      - uses: codecov/codecov-action@v5

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
